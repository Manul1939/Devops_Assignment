name: MultiTenant-CICD

# Build + GHCR push always runs on GitHub-hosted Linux.
# Helm / rollback / Kafka run on a self-hosted runner so your kubeconfig
# (e.g. local Minikube on your laptop) is reachable. See workflow_dispatch
# and repo variable ENABLE_K8S_DEPLOY.

on:
  push:
    branches: [main, develop, "user/**"]
  workflow_dispatch:
    inputs:
      run_full:
        description: "Run Helm deploy, rollback, and Kafka (requires self-hosted runner)"
        type: boolean
        default: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  KAFKA_TOPIC: deployment-events

jobs:
  build:
    name: Build and push
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - tenant: user1
            app: node-app
            image_name: tenant-node-app
            namespace: user1
            values_file: tenants/user1-values.yaml
            domain: user1.example.com
          - tenant: user2
            app: flask-app
            image_name: tenant-flask-app
            namespace: user2
            values_file: tenants/user2-values.yaml
            domain: user2.example.com
          - tenant: user3
            app: node-app
            image_name: tenant-node-app
            namespace: user3
            values_file: tenants/user3-values.yaml
            domain: user3.example.com

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute lowercase image namespace
        id: image_ns
        shell: bash
        run: |
          echo "value=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./apps/${{ matrix.app }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.image_ns.outputs.value }}/${{ matrix.image_name }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ steps.image_ns.outputs.value }}/${{ matrix.image_name }}:${{ github.ref_name }}

  deploy:
    name: Deploy (self-hosted) + Kafka
    needs: build
    if: (github.event_name == 'push' && vars.ENABLE_K8S_DEPLOY == 'true') || (github.event_name == 'workflow_dispatch' && inputs.run_full)
    # Use any self-hosted runner (Windows with Minikube, WSL, or Linux). Install kubectl/helm or rely on the runner image.
    runs-on: self-hosted
    strategy:
      fail-fast: false
      matrix:
        include:
          - tenant: user1
            app: node-app
            image_name: tenant-node-app
            namespace: user1
            values_file: tenants/user1-values.yaml
            domain: user1.example.com
          - tenant: user2
            app: flask-app
            image_name: tenant-flask-app
            namespace: user2
            values_file: tenants/user2-values.yaml
            domain: user2.example.com
          - tenant: user3
            app: node-app
            image_name: tenant-node-app
            namespace: user3
            values_file: tenants/user3-values.yaml
            domain: user3.example.com

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Compute lowercase image namespace
        id: image_ns
        shell: bash
        run: |
          echo "value=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Configure kubeconfig
        shell: bash
        run: |
          mkdir -p ~/.kube
          CLEAN_INPUT="$(printf '%s' "${KUBE_CONFIG_DATA}" | tr -d '\r')"
          if printf '%s' "${CLEAN_INPUT}" | base64 --decode > ~/.kube/config 2>/dev/null; then
            echo "Loaded kubeconfig from base64 secret."
          else
            printf '%s\n' "${KUBE_CONFIG_DATA}" > ~/.kube/config
            echo "Loaded kubeconfig from raw secret text."
          fi
          chmod 600 ~/.kube/config
        env:
          KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG_DATA }}

      - name: Kube API sanity check
        shell: bash
        run: |
          echo "server=$(kubectl config view --minify -o jsonpath='{.clusters[0].cluster.server}')"
          kubectl cluster-info

      - name: Deploy with rollback
        id: deploy
        shell: bash
        run: |
          set +e
          RELEASE="${{ matrix.tenant }}-site"
          helm upgrade --install "$RELEASE" ./helm/tenant-site \
            -n "${{ matrix.namespace }}" --create-namespace \
            -f "${{ matrix.values_file }}" \
            --set image.repository="${{ env.REGISTRY }}/${{ steps.image_ns.outputs.value }}/${{ matrix.image_name }}" \
            --set image.tag="${{ github.sha }}"
          STATUS=$?

          if [ $STATUS -ne 0 ]; then
            echo "Deployment failed for $RELEASE. Attempting rollback."
            PREV=$(helm history "$RELEASE" -n "${{ matrix.namespace }}" -o json | python -c "import json,sys; a=json.load(sys.stdin); print(a[-2]['revision'] if len(a)>=2 else '')")
            if [ -n "$PREV" ]; then
              helm rollback "$RELEASE" "$PREV" -n "${{ matrix.namespace }}"
            fi
            exit 1
          fi

      - name: Publish Kafka deployment event
        if: success()
        run: |
          python -m pip install -r events/requirements.txt
          python events/publish_event.py
        env:
          KAFKA_BOOTSTRAP: ${{ secrets.KAFKA_BOOTSTRAP }}
          KAFKA_TOPIC: ${{ env.KAFKA_TOPIC }}
          TENANT: ${{ matrix.tenant }}
          NAMESPACE: ${{ matrix.namespace }}
          DOMAIN: ${{ matrix.domain }}
          IMAGE: ${{ env.REGISTRY }}/${{ steps.image_ns.outputs.value }}/${{ matrix.image_name }}:${{ github.sha }}
          STATUS: deployed
